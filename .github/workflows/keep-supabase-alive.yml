name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 UTC every 2 days (more frequent to be safe)
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab for testing

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          # We use the REST API to query the OpenAPI spec which ensures it registers as DB activity.
          # The -s flag silences progress, -o /dev/null ignores the body, and -w "%{http_code}" prints the status code.
          echo "Pinging Supabase..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "Response HTTP Status: $RESPONSE"
          
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "Successfully pinged Supabase."
          elif [ "$RESPONSE" -eq 401 ] || [ "$RESPONSE" -eq 403 ]; then
            echo "Authentication failed. Please check if SUPABASE_URL and SUPABASE_ANON_KEY secrets are set correctly in GitHub repository settings."
            exit 1
          else
            echo "Failed to ping Supabase. HTTP Status: $RESPONSE"
            exit 1
          fi
